name: Magisk Module Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Zip module
        run: |
          zip -r0 PostCallSpeakerFixer.zip . -x "*.git*" -x ".github/*"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: PostCallSpeakerFixer.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
